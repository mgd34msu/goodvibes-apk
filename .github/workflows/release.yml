name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare signing material
        shell: bash
        run: |
          if [[ -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" && \
                -n "${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}" && \
                -n "${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}" && \
                -n "${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}" ]]; then
            echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
            {
              echo "ANDROID_SIGNING_STORE_FILE=app/release.keystore"
              echo "ANDROID_SIGNING_STORE_PASSWORD=${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}"
              echo "ANDROID_SIGNING_KEY_ALIAS=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
              echo "ANDROID_SIGNING_KEY_PASSWORD=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
              echo "APK_SIGNING_LABEL=release-signed"
            } >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -v \
              -keystore android/app/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "APK_SIGNING_LABEL=debug-signed" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: goodvibes-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GoodVibes Companion ${{ github.ref_name }}
          generate_release_notes: true
          body_path: docs/releases/${{ github.ref_name }}.md
          files: android/app/build/outputs/apk/release/app-release.apk
          body: |
            Android release of GoodVibes Companion.

            Installable APK: `app-release.apk`
            Signing: `${{ env.APK_SIGNING_LABEL }}`

            Full usage and setup notes are in the repository README.
